<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Repository</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- IAAC Design System -->
  <link rel="stylesheet" href="/iaac-repo/design-system/design-system.css" />

  <style>
    /* ---------- page tweaks ---------- */
    body { margin:0; background:#E24E36; }
    
  
    header.hero {
      background:#E24E36; color:#fff;
      padding: 4rem 2rem 3rem;
    }
    header.hero .content { max-width:1200px; margin:0 auto; }
    header h1 {
      font-family: var(--font-display, 'Abril Fatface', serif);
      font-weight:400; color:#fff;
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      margin:0 0 1rem 0;
      line-height:1.1;
    }
    header p { max-width:60ch; color:#fff; opacity:.95; font-size:1.1rem; margin:0; }

    main .content { max-width:1200px; margin:0 auto; padding: 0 2rem; }

    .controls {
      display:grid;
      grid-template-columns: 260px 1fr 140px;
      gap: var(--space-md);
      align-items:center;
      margin: 2rem 0 2.5rem;
    }
    @media (max-width:900px){
      .controls{ grid-template-columns: 1fr; }
    }

    select, input[type="search"]{
      padding: .7rem .8rem;
      border-radius: 8px;
      border:1px solid #ddd;
      font: inherit;
      background:#fff;
    }
    .count { text-align:right; opacity:.7; }
    @media (max-width:900px){ .count{ text-align:left; } }

    .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
    @media (max-width:1200px){ .grid{ grid-template-columns: repeat(3, 1fr);} }
    @media (max-width:900px){ .grid{ grid-template-columns: repeat(2, 1fr);} }
    @media (max-width:640px){ .grid{ grid-template-columns: 1fr; } }

    .card {
      background: #fff;
      border-radius: 16px;
      border: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      overflow: hidden;
      display:flex; flex-direction:column;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.16);
    }
    
    .card-header {
      height: 120px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
      background-size: 300% 300%;
      animation: gradientShift 8s ease infinite;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .card-body { 
      width: 240 px; /* prevent excessive stretching on wide screens */
      display:flex; flex-direction:column; gap: 0.75rem;
      padding: 1.25rem;
      flex-grow: 1;
    }
    
    .badge {
      display:inline-block; padding:.4rem .8rem; border-radius:20px;
      font-size:.7rem; font-weight:700; background:#4B7AFF; color:#fff;
      border: none;
      width: fit-content;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .title { font-weight:700; font-size:1rem; margin:0; line-height:1.4; color:#000; }
    .subtitle { font-size:0.85rem; color:#666; margin:0; }
    
    .card-actions { margin-top:auto; pt:0.75rem; }
    .primary-btn { width:100%; text-align:center; padding:0.75rem; background:#4B7AFF; color:#fff; text-decoration:none; border-radius:8px; font-weight:600; display:block; }
    .primary-btn:hover { background:#3a5fbf; }
    
    .empty { opacity:.7; padding:2rem 0; }
  </style>
</head>
<body>
  <!-- HERO -->
  <header class="hero">
    <div class="content">
      <h1>Repository<br>of Course Artefacts</h1>
      <p>
        This section provide a comprehensive list of artefacts, deliverables compiled for the program courses.
      </p>
    </div>
  </header>

  <!-- GALLERY -->
  <main>
    <div class="content">

      <div class="controls">
        <select id="courseFilter" aria-label="Filter by course">
          <!-- options injected by JS -->
        </select>

        <input id="searchBox" type="search" placeholder="Search titles or tags…" aria-label="Search">

        <div class="count" id="resultCount">0 items</div>
      </div>

      <div id="gallery" class="grid" aria-live="polite"></div>
      <div id="emptyState" class="empty" hidden>No items match your filter.</div>

    </div>
  </main>

  <script>
    /* ========== Dynamic course loading ========== */
    const COURSES_DIR = '/iaac-repo/repository/courses/';
    const COURSES = [
      'Fundamentals for Future Makers',
      'atlas of weak signals',
      'cognitive orgies',
      'design with others',
      'extended intelligence ',
      'living with your own ideas',
      'narrative II',
      'other species',
      'situated design practices',
      'studio 0',
      'studio 1',
      'studio 2',
      'unpacking tech system'
    ];

    const COURSE_PAGES = {
      'Fundamentals for Future Makers': ['course reflection.html'],
      'atlas of weak signals': ['community testing of cards.html'],
      'cognitive orgies': ['week one reflection.html', 'week two reflection.html', 'week three reflection.html'],
      'design with others': ['reflection.html'],
      'extended intelligence ': ['AIManifesto.html', 'agent creation reflection.html', 'novel writing with AI.html', 'regulate LOI manifesto.html'],
      'living with your own ideas': ['prototype 1.html', 'prototype 2.html', 'prototype 3.html', 'summary report.html'],
      'narrative II': ['one-pager summary.html'],
      'other species': ['cottage-industry.html', 'extend attention GMO.html'],
      'situated design practices': ['reflection.html'],
      'studio 0': ['index.html', 'atlas of weak signals.html'],
      'studio 1': ['Action Dossier.html', 'Narrative I.html', 'emboded criticism.html', 'problem statement.html'],
      'studio 2': ['problematize ethics.html', 'problematize myself.html', 'problematize narrative.html', 'problematize space.html'],
      'unpacking tech system': ['Week 1 Reflection.html', 'Week 2 Reflection.html']
    };

    let deliverables = [];

    // Load all deliverables from course folders
    async function loadDeliverables() {
      const promises = [];

      for (const courseName of COURSES) {
        const encodedCourse = encodeURIComponent(courseName);
        const courseUrl = `${COURSES_DIR}${encodedCourse}/`;

        const files = COURSE_PAGES[courseName] || [];

        for (const file of files) {
          const fileUrl = courseUrl + encodeURIComponent(file);
          const promise = fetch(fileUrl, { method: 'HEAD' })
            .then(response => {
              if (response.ok && response.status === 200) {
                // File exists, now fetch title
                return fetch(fileUrl)
                  .then(r => r.text())
                  .then(html => {
                    const titleMatch = html.match(/<title>([^<]+)<\/title>/i);
                    const title = titleMatch ? titleMatch[1] : null;
                    if (title && title !== 'Untitled') {
                      return {
                        title: title,
                        course: courseName,
                        href: fileUrl.replace(encodeURIComponent(file), file),
                        fileName: file
                      };
                    }
                    return null;
                  })
                  .catch(() => null);
              }
              return null;
            })
            .catch(() => null);
          promises.push(promise);
        }
      }

      const results = await Promise.all(promises);
      deliverables = results.filter(d => d !== null);
      
      initializeUI();
    }

    /* ========== UI wiring ========== */
    function initializeUI() {
      const galleryEl = document.getElementById('gallery');
      const courseFilterEl = document.getElementById('courseFilter');
      const searchBoxEl = document.getElementById('searchBox');
      const resultCountEl = document.getElementById('resultCount');
      const emptyEl = document.getElementById('emptyState');

      // Build distinct course list + query param support
      const urlParams = new URLSearchParams(location.search);
      const qpCourse = (urlParams.get('course') || '').toLowerCase();

      const courses = Array.from(new Set(deliverables.map(d => d.course.toLowerCase()))).sort();
      courseFilterEl.innerHTML = [
        `<option value="all">All courses</option>`,
        ...courses.map(c => `<option value="${c}">${titleCase(c)}</option>`)
      ].join('');
      if (qpCourse && courses.includes(qpCourse)) courseFilterEl.value = qpCourse;

      // Render
      function render() {
        const q = searchBoxEl.value.trim().toLowerCase();
        const selected = courseFilterEl.value;

        const filtered = deliverables.filter(d => {
          const matchesCourse = selected === 'all' || d.course.toLowerCase() === selected;
          const hay = [d.title, d.fileName].join(' ').toLowerCase();
          const matchesSearch = !q || hay.includes(q);
          return matchesCourse && matchesSearch;
        });

        galleryEl.innerHTML = filtered.map(cardHTML).join('');
        resultCountEl.textContent = `${filtered.length} item${filtered.length!==1?'s':''}`;
        emptyEl.hidden = filtered.length !== 0;
      }

      function cardHTML(d){
        return `
          <article class="card">
            <div class="card-header"></div>
            <div class="card-body">
              <span class="badge">Tag</span>
              <h3 class="title">${escapeHTML(d.title)}</h3>
              <div class="card-actions">
                <a class="primary-btn" href="${d.href}">Open</a>
              </div>
            </div>
          </article>`;
      }

      function escapeHTML(s){return s.replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
      function titleCase(s){ return s.replace(/\b\w/g, c => c.toUpperCase()); }

      // Events
      courseFilterEl.addEventListener('change', () => {
        const v = courseFilterEl.value;
        const p = new URLSearchParams(location.search);
        if (v==='all') { p.delete('course'); } else { p.set('course', v); }
        history.replaceState({}, '', `${location.pathname}?${p.toString()}`);
        render();
      });
      searchBoxEl.addEventListener('input', render);

      // Initial render
      render();
    }

    // Load on page load
    document.addEventListener('DOMContentLoaded', loadDeliverables);
  </script>
</body>
</html>
